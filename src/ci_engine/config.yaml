# src/ci_engine/config.yaml — THE single source of truth. Nothing tunable lives outside this file.

project:
  gcp_project_id: jfrog-intel-rag
  region: europe-west1

# --- LLMs: most capable model the task needs; cost reduced only where it doesn't cost quality ---
models:
  synthesis:   { name: "claude-opus-4-8",        temperature: 0.2, thinking: high }   # accuracy-critical compile + report
  report:      { name: "claude-opus-4-8",        temperature: 0.3, thinking: high }
  chat_answer: { name: "claude-sonnet-4-6",      temperature: 0.2, thinking: medium } # fast, grounded Q&A
  relevance:   { name: "claude-haiku-4-5",       temperature: 0.0, thinking: none }   # cheap classification only
  # NOTE: confirm current model IDs against https://docs.claude.com before the demo.

embedding:
  model: "gemini-embedding-001"   # fixed per the brief; via Vertex AI + ADC (no key)
  dimensions: 1536                # MRL-truncated: same MTEB as 3072, half the storage, within pgvector's HNSW limit
  doc_task_type: RETRIEVAL_DOCUMENT
  query_task_type: RETRIEVAL_QUERY

# --- Retrieval ---
retrieval:
  top_k: 8
  similarity_threshold: 0.55      # cosine; chunks below this are dropped
  max_graph_hops: 2               # entity/relationship expansion for comparison queries
  recency_weights:                # final_score = similarity * (recency_weight ** age_in_halflives)
    enabled: true
    decay_base: 0.5               # one half-life => weight halves

# --- Chunking ---
chunking:
  chunk_size: 1200                # characters of compiled text per chunk
  chunk_overlap: 150

# --- Ingestion / relevance filter ---
ingestion:
  relevance_threshold: 0.6        # 0-1 score from the relevance model; below => discard
  insert_batch_size: 16

# --- Freshness lifecycle (half-life per doc_type, in days) ---
freshness:
  half_life_days:
    release_notes: 60
    docs: 120
    news: 21
    pricing: 90
    analyst: 180
    blog: 45
    company_fact: 365
  stale_after_halflives: 2        # past this multiple of its half-life => status='stale'
  head_check_timeout_s: 8

# --- The corpus: tracked competitors (extensible at any time) ---
competitors:
  - JFrog            # the anchor; every report compares against it
  - Sonatype
  - Snyk
  - Black Duck
  - Endor Labs
  - Checkmarx
  - Mend
  - GitLab
  - GitHub
  - Aqua Security

# Demo depth: deep-map these now; the rest are seeded and deepened as a Next Step.
deep_map_now: [JFrog, Snyk, Sonatype, GitLab]

# --- Coverage ontology: the two axes the deep-map, discovery and reports all use ---
ontology:
  technical:
    - software_composition_analysis
    - static_analysis_sast
    - container_image_scanning
    - sbom_generation
    - license_compliance
    - secrets_detection
    - malicious_package_detection
    - policy_governance
    - ci_cd_ide_integrations
    - supported_ecosystems
    - architecture_deployment_model
    - ai_features
    - release_cadence
  business:
    - market_positioning
    - target_segments_icp
    - pricing_packaging
    - gtm_motion
    - partnerships_ecosystem
    - funding_ownership
    - customers_case_studies
    - analyst_positioning
    - mergers_acquisitions
    - leadership_strategy_signals
    - win_loss_signals