# src/ci_engine/config.yaml — THE single source of truth. Nothing tunable lives outside this file.

project:
  gcp_project_id: jfrog-intel-rag
  region: europe-west1

# --- LLMs: most capable model the task needs; cost reduced only where it doesn't cost quality ---
models:
  synthesis:
    name: "claude-opus-4-8"
    temperature: 0.2
    thinking: high
  report:
    name: "claude-opus-4-8"
    temperature: 0.3
    thinking: high
  chat_answer:
    name: "claude-sonnet-4-6"
    temperature: 0.2
    thinking: medium
  relevance:
    name: "claude-haiku-4-5"
    temperature: 0.0
    thinking: none
# NOTE: confirm current model IDs against https://docs.claude.com before the demo.

embedding:
  model: "gemini-embedding-001"
  dimensions: 1536
  doc_task_type: RETRIEVAL_DOCUMENT
  query_task_type: RETRIEVAL_QUERY

# --- Retrieval ---
retrieval:
  top_k: 8
  similarity_threshold: 0.55
  max_graph_hops: 2
  recency_weights:
    enabled: true
    decay_base: 0.5

# --- Chunking ---
chunking:
  chunk_size: 1200
  chunk_overlap: 150

# --- Ingestion / relevance filter ---
ingestion:
  relevance_threshold: 0.6
  insert_batch_size: 16

# --- Freshness lifecycle (half-life per doc_type, in days) ---
freshness:
  half_life_days:
    release_notes: 60
    docs: 120
    news: 21
    pricing: 90
    analyst: 180
    blog: 45
    company_fact: 365
  stale_after_halflives: 2
  head_check_timeout_s: 8

# --- The corpus: tracked competitors (extensible at any time) ---
competitors:
  - JFrog
  - Sonatype
  - Snyk
  - Black Duck
  - Endor Labs
  - Checkmarx
  - Mend
  - GitLab
  - GitHub
  - Aqua Security

# Demo depth: deep-map these now; the rest are seeded and deepened as a Next Step.
deep_map_now:
  - JFrog
  - Snyk
  - Sonatype
  - GitLab

