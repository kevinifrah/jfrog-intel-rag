# src/ci_engine/config.yaml — THE single source of truth. Nothing tunable lives outside this file.

project:
  gcp_project_id: jfrog-intel-rag
  region: europe-west1

database:
  instance_connection_name: "jfrog-intel-rag:europe-west1:ci-db"
  name: "ci"
  driver: "pg8000"
  enable_iam_auth: true
  iam_user: "ci-engine-sa@jfrog-intel-rag.iam"
  impersonate_service_account: "ci-engine-sa@jfrog-intel-rag.iam.gserviceaccount.com"
  connect_timeout_s: 15

# --- LLMs: most capable model the task needs; cost reduced only where it doesn't cost quality ---
models:
  synthesis:
    name: "claude-opus-4-8"
    temperature: 0.2
    thinking: high
    max_tokens: 12000
    timeout_s: 120
  report:
    name: "claude-sonnet-4-6"
    temperature: 0.3
    thinking: high
    # Explicit budget so framework-rich structured JSON (capability matrix, PESTEL,
    # Five Forces, positioning, SWOT) is never truncated mid-sentence.
    max_tokens: 10000
    timeout_s: 240
  chat_planner:
    name: "claude-haiku-4-5"
    temperature: 0.0
    max_tokens: 1000
    timeout_s: 8
  chat_answer:
    name: "claude-sonnet-4-6"
    temperature: 0.1
    thinking: none
    max_tokens: 2500
    timeout_s: 30
  chat_fallback:
    name: "claude-sonnet-4-6"
    temperature: 0.1
    thinking: medium
    max_tokens: 2500
    timeout_s: 20
  web_research:
    name: "claude-sonnet-4-6"
    temperature: 0.0
    max_tokens: 12000
    timeout_s: 180
    web_search_max_uses: 12
  report_splitter:
    name: "claude-haiku-4-5"
    temperature: 0.0
    max_tokens: 12000
    timeout_s: 180
  relevance:
    name: "claude-haiku-4-5"
    temperature: 0.0
    thinking: none
# NOTE: confirm current model IDs against https://docs.claude.com before the demo.

embedding:
  model: "gemini-embedding-001"
  dimensions: 1536
  doc_task_type: RETRIEVAL_DOCUMENT
  query_task_type: RETRIEVAL_QUERY

# --- Retrieval ---
retrieval:
  top_k: 8
  similarity_threshold: 0.55
  max_graph_hops: 2
  research_on_missing:
    max_candidates_per_gap: 4
  recency_weights:
    enabled: true
    decay_base: 0.5

# --- Interactive report console and grounded chat ---
chat:
  report_root: "reports"
  tavily_default_depth: "ultra-fast"
  tavily_retry_depth: "fast"
  tavily_max_results: 3
  max_evidence_items: 8
  answer_prompt_max_evidence: 8
  answer_evidence_text_chars: 1400
  cache:
    tavily_ttl_s: 900

ui:
  host: "127.0.0.1"
  port: 8090

# --- Chunking ---
chunking:
  chunk_size: 1200
  chunk_overlap: 150

# --- Ingestion / relevance filter ---
ingestion:
  preflight_db: true
  relevance_threshold: 0.6
  insert_batch_size: 16
  llm_timeout_s: 30
  web_discovery_timeout_s: 30
  relevance_content_chars: 6000
  max_report_slices: 32
  enable_web_research_lane: true
  enable_tavily_lane: true
  enable_context7_lane: true
  max_company_profile_candidates: 8
  max_candidates_per_dimension: 8
  profile_feed_limit: 3

# --- Freshness lifecycle (half-life per doc_type, in days) ---
freshness:
  half_life_days:
    release_notes: 60
    docs: 120
    news: 21
    pricing: 90
    analyst: 180
    blog: 45
    company_fact: 365
  stale_after_halflives: 2
  head_check_timeout_s: 8

# --- The corpus: tracked companies (extensible at any time) ---
companies:
  - JFrog
  - Sonatype
  - Snyk
  - Black Duck
  - Endor Labs
  - Checkmarx
  - Mend
  - GitLab
  - GitHub
  - Aqua Security

# Demo depth: deep-map these now; the rest are seeded and deepened as a Next Step.
deep_map_now:
  - JFrog
  - Snyk
  - Sonatype
  - GitLab

# --- Coverage ontology: the two axes the deep-map, discovery and reports all use ---
ontology:
  technical:
    # Company/Product Baseline
    - product_portfolio
    # SCA & Vulnerability Management
    - software_composition_analysis
    - cve_contextual_analysis
    - reachability_analysis
    - impact_analysis
    - recursive_deep_scanning
    - operational_risk
    - security_research
    # Secrets & Code Security
    - secrets_detection
    - static_analysis_sast
    - services_misconfiguration
    - autofix_remediation
    # Supply Chain Security
    - malicious_package_detection
    - open_source_curation
    - package_firewall
    - ai_model_scanning
    - sbom_generation
    # Infrastructure & Runtime
    - container_image_scanning
    - iac_security
    - runtime_security
    # License & Policy
    - license_compliance
    - policy_governance
    # Platform & Distribution
    - artifact_management
    - software_distribution
    - edge_node_delivery
    - release_lifecycle_management
    - architecture_deployment_model
    # MLOps
    - mlops_model_registry
    # Developer Experience
    - ci_cd_ide_integrations
    - supported_ecosystems
    - release_cadence
    - ai_features
  business:
    - company_profile
    - market_positioning
    - target_segments_icp
    - pricing_packaging
    - gtm_motion
    - partnerships_ecosystem
    - funding_ownership
    - customers_case_studies
    - analyst_positioning
    - mergers_acquisitions
    - leadership_strategy_signals
    - win_loss_signals
